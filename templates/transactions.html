{% extends "base.html" %}

{% block content %}

<h2>Transaksi</h2>

<div class="card">
    
    <form action="{{ url_for('transactions') }}" method="get">
        <div class="form-group">
            <label>Kategori</label>
            <input type="text" name="search" placeholder="Cari Kategori...">
        </div>

        <div class="form-group">
            <label>Jenis :</label>
            <select name="jenis">
                <option>Semua</option>
                <option>Pemasukan</option>
                <option>Pengeluaran</option>
            </select>
        </div>

        <button type="submit">Search</button>
    </form>

</div>

<table class="transaction-table">
    
    <tr>
        <th>Kategori</th>
        <th>Jumlah</th>
        <th>Jenis</th>
        <th>Catatan</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>

    {% for transaction in transactions %}
    <tr>
        <td>{{ transaction.category }}</td>
        <td>{{ transaction.amount }}</td>
        <td>{{ transaction.jenis }}</td>
        <td>{{ transaction.description }}</td>
        <td>
            <a href="{{ url_for('edit', id=transaction.id) }}">Edit</a>
        </td>
        <td>
            <a href="{{ url_for('delete', id=transaction.id)}}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
